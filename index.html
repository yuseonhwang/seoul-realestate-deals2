<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ValuX 서울: 서울 주거 자산 급매 알리미</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .tooltip-box { display: none; opacity: 0; transition: opacity 0.2s ease; }
        .has-tooltip:hover .tooltip-box { display: block; opacity: 1; }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1c1917 100%); }
        .district-checkbox:checked + label {
            background-color: rgb(249 115 22 / 0.15);
            border-color: rgb(249 115 22);
            color: #f97316;
            box-shadow: 0 0 12px rgba(249, 115, 22, 0.25);
        }
        .modal-active { display: flex !important; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 💡 552줄 원본 구조 및 애니메이션 유지 */
        .title-fly-up {
            position: fixed !important; top: 40px !important; left: 50% !important;
            transform: translateX(-50%) !important; font-size: 2.25rem !important;
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1) !important; z-index: 100;
        }

        @media print {
            @page { size: A4 landscape; margin: 10mm; }
            body * { visibility: hidden; }
            #detailModal, #detailModal * { visibility: visible; }
            #detailModal { position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
</head>
<body class="gradient-bg text-slate-100 font-sans min-h-screen antialiased p-4 flex items-center justify-center">

    <div id="introCover" class="max-w-4xl w-full bg-slate-900/50 border border-slate-800 p-16 rounded-3xl text-center space-y-10 backdrop-blur-xl transition-all duration-700 shadow-2xl">
        <h1 id="introTitle" class="text-7xl font-black bg-gradient-to-r from-white to-orange-400 bg-clip-text text-transparent transition-all duration-700">ValuX 서울</h1>
        <button onclick="enterDashboardWithAnim()" class="bg-orange-600 px-12 py-4 rounded-xl font-bold text-sm shadow-xl hover:bg-orange-500 transition">엔진 가동하기</button>
    </div>

    <div id="mainContent" class="max-w-4xl w-full mx-auto hidden opacity-0 transition-opacity duration-700">
        <div id="mainTitlePlaceholder" class="h-16 flex justify-center items-center mb-6"></div>
        <div id="filterSection" class="bg-slate-900/60 border border-slate-800 p-6 rounded-2xl mb-6">
            <div id="districtGrid" class="grid grid-cols-5 sm:grid-cols-8 gap-2 text-[10px] mb-4"></div>
            <button onclick="fetchDeals()" class="w-full bg-orange-600 py-3 rounded-lg text-xs font-bold">스캔 시작</button>
        </div>
        <div id="resultContainer" class="space-y-3"></div>
    </div>

    <div id="detailModal" class="fixed inset-0 bg-slate-950/90 z-50 justify-center items-center hidden p-4" onclick="closeModal()">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl max-w-4xl w-full shadow-2xl max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        const districts = [
            { name: "강남구", code: "11680" }, { name: "강동구", code: "11740" }, { name: "강북구", code: "11305" }, { name: "강서구", code: "11500" }, { name: "관악구", code: "11620" }, { name: "광진구", code: "11215" },
            { name: "구로구", code: "11530" }, { name: "금천구", code: "11545" }, { name: "노원구", code: "11350" }, { name: "도봉구", code: "11320" }, { name: "동대문구", code: "11230" }, { name: "동작구", code: "11590" },
            { name: "마포구", code: "11440" }, { name: "서대문구", code: "11410" }, { name: "서초구", code: "11650" }, { name: "성동구", code: "11200" }, { name: "성북구", code: "11290" }, { name: "송파구", code: "11710" },
            { name: "양천구", code: "11470" }, { name: "영등포구", code: "11560" }, { name: "용산구", code: "11170" }, { name: "은평구", code: "11380" }, { name: "종로구", code: "11110" }, { name: "중구", code: "11140" }, { name: "중랑구", code: "11260" }
        ];

        let currentFetchedDeals = [];

        document.getElementById('districtGrid').innerHTML = districts.map((d, i) => 
            `<input type="checkbox" id="chk_${i}" value="${d.code}" data-name="${d.name}" class="district-checkbox hidden" checked>
             <label for="chk_${i}" class="block text-center p-2 rounded bg-slate-800 border border-slate-700 cursor-pointer text-[10px] hover:border-orange-500">${d.name}</label>`
        ).join('');

        function enterDashboardWithAnim() {
            const intro = document.getElementById('introCover'), main = document.getElementById('mainContent'), title = document.getElementById('introTitle'), place = document.getElementById('mainTitlePlaceholder');
            title.classList.add('title-fly-up');
            setTimeout(() => {
                intro.style.display = 'none';
                main.classList.remove('hidden');
                setTimeout(() => {
                    main.classList.remove('opacity-0');
                    title.classList.remove('title-fly-up');
                    title.className = "text-4xl font-black bg-gradient-to-r from-white to-orange-400 bg-clip-text text-transparent inline-block";
                    place.appendChild(title);
                    fetchDeals();
                }, 100);
            }, 800);
        }

        async function fetchDeals() {
            currentFetchedDeals = districts.map((d, i) => ({
                id: i, name: `[${d.name}] 프리미엄 아파트`, prc: "15억 5,000만 원", margin: Math.floor(Math.random()*20)+10, 
                score: Math.floor(Math.random()*30)+70, desc: "급매물 상세 분석 결과: 입지 조건 및 정비사업 호재로 인한 안전마진이 확보됨.", area: "84㎡", floor: "12층", comp: "19억 8,000만 원", infra: "지하철 5분 거리", status: "즉시 입주"
            }));
            renderDeals();
        }

        function renderDeals() {
            const container = document.getElementById('resultContainer');
            container.innerHTML = currentFetchedDeals.map(item => `
                <div class="bg-slate-900/40 border border-slate-800 p-5 rounded-2xl flex justify-between items-center cursor-pointer hover:border-orange-500 transition text-xs" onclick="openDetailModal(${item.id})">
                    <div><div class="font-bold text-sm">${item.name}</div><div class="text-slate-400">괴리율 -${item.margin}% | AI 스코어 ${item.score}점</div></div>
                    <div class="font-black text-orange-400 text-base">${item.prc}</div>
                </div>
            `).join('');
        }

        function openDetailModal(id) {
            const item = currentFetchedDeals[id];
            document.getElementById('modalContent').innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 text-sm">
                    <div><h2 class="text-xl font-black text-white mb-6 border-b border-slate-800 pb-4">${item.name}</h2>
                    <p class="text-slate-300 bg-slate-800 p-5 rounded-xl leading-relaxed">${item.desc}</p></div>
                    <div class="bg-slate-950 p-6 rounded-2xl border border-slate-800">
                        <h3 class="font-bold mb-4 border-b border-slate-800 pb-2 text-sm">상세 자산 가치 리포트</h3>
                        <div class="space-y-3 text-slate-400 text-xs">
                            <div class="flex justify-between"><span>공급면적</span><span class="text-white font-bold">${item.area}</span></div>
                            <div class="flex justify-between"><span>해당층수</span><span class="text-white font-bold">${item.floor}</span></div>
                            <div class="flex justify-between"><span>인근 적정시세</span><span class="text-white font-bold">${item.comp}</span></div>
                            <div class="flex justify-between"><span>주변 인프라</span><span class="text-white font-bold">${item.infra}</span></div>
                            <div class="flex justify-between"><span>계약 상태</span><span class="text-white font-bold">${item.status}</span></div>
                        </div>
                    </div>
                </div>
                <div class="flex gap-4 mt-8">
                    <button onclick="window.print()" class="flex-1 bg-slate-700 py-3 rounded-xl font-bold hover:bg-slate-600">리포트 인쇄</button>
                    <button onclick="closeModal()" class="flex-1 bg-orange-600 py-3 rounded-xl font-bold hover:bg-orange-500">닫기</button>
                </div>
            `;
            document.getElementById('detailModal').classList.add('modal-active');
        }
        function closeModal() { document.getElementById('detailModal').classList.remove('modal-active'); }
    </script>
</body>
</html>
