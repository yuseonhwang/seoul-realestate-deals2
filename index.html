<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alternative-IQ: 서울 주거 자산 급매 알리미</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .tooltip-box { display: none; opacity: 0; transition: opacity 0.2s ease; }
        .has-tooltip:hover .tooltip-box { display: block; opacity: 1; }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); }
        .district-checkbox:checked + label {
            background-color: rgb(79 70 229 / 0.2);
            border-color: rgb(99 102 241);
            color: white;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.3);
        }
        /* 모달 팝업 애니메이션 */
        .modal-active { display: flex !important; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="gradient-bg text-slate-100 font-sans min-h-screen antialiased selection:bg-indigo-500 selection:text-white">

    <div class="max-w-4xl mx-auto p-6">
        <header class="mb-12 text-center pt-8">
            <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 text-xs font-semibold mb-4 backdrop-blur-sm">
                <span class="flex h-2 w-2 rounded-full bg-emerald-400 animate-pulse"></span>
                시연 전용: 대체투자 사후관리 가치평가 엔진 가동 중
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight bg-gradient-to-r from-white via-slate-200 to-indigo-200 bg-clip-text text-transparent flex justify-center items-center gap-3">
                <i class="fa-solid fa-chart-line text-indigo-400"></i> 서울 주거 자산 급매 알리미
            </h1>
            <p class="text-slate-400 mt-3 text-sm max-w-md mx-auto leading-relaxed">
                매물 카드를 <span class="text-emerald-400 font-semibold">클릭</span>하시면 AI 심층 가치평가 및 투자 제안서 요약을 확인할 수 있습니다.
            </p>
        </header>

        <div class="bg-slate-900/60 border border-slate-800 p-6 rounded-2xl shadow-2xl mb-8 space-y-6 backdrop-blur-md">
            <div>
                <div class="flex justify-between items-center mb-3">
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400">지역 복수 선택 (중복 가능)</label>
                    <div class="space-x-2">
                        <button onclick="selectAllDistricts(true)" class="text-[11px] text-indigo-400 hover:underline">전체 선택</button>
                        <button onclick="selectAllDistricts(false)" class="text-[11px] text-slate-500 hover:underline">전체 해제</button>
                    </div>
                </div>
                <div id="districtGrid" class="grid grid-cols-3 sm:grid-cols-5 gap-2 text-xs"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 pt-2 border-t border-slate-800/60">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">급매 기준 (하락폭)</label>
                    <select id="discountSelect" class="w-full p-3 border border-slate-700 rounded-xl bg-slate-800 text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
                        <option value="10">명목 시세 대비 10% 이상 저렴</option>
                        <option value="20" selected>🔥 마켓 관행 대비 20% 이상 저렴</option>
                        <option value="30">🚨 긴급 처분성 30% 이상 초급매</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button onclick="fetchDeals()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-indigo-600/20 transition active:scale-[0.98] flex justify-center items-center gap-2">
                        <i class="fa-solid fa-magnifying-glass text-sm"></i> 선택 지역 고속 스캔 가동
                    </button>
                </div>
            </div>
        </div>

        <div id="loading" class="text-center hidden my-16">
            <div class="inline-block relative w-12 h-12">
                <div class="absolute top-0 left-0 w-full h-full border-4 border-indigo-500/20 rounded-full"></div>
                <div class="absolute top-0 left-0 w-full h-full border-4 border-t-indigo-500 rounded-full animate-spin"></div>
            </div>
            <p class="mt-4 text-sm text-slate-400 tracking-wide">Vercel Edge 서버 기반 자산 가치 비교 연산 중...</p>
        </div>

        <div id="resultContainer" class="space-y-4"></div>
    </div>

    <div id="detailModal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 justify-center items-center hidden p-4" onclick="closeModal(event)">
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl max-w-lg w-full shadow-2xl relative" onclick="event.stopPropagation()">
            <button onclick="document.getElementById('detailModal').classList.remove('modal-active')" class="absolute top-4 right-4 text-slate-400 hover:text-white transition">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        const districts = [
            { name: "강남구", code: "1168000000" }, { name: "강동구", code: "1174000000" }, { name: "강북구", code: "1130500000" },
            { name: "강서구", code: "1150000000" }, { name: "관악구", code: "1162000000" }, { name: "광진구", code: "1121500000" },
            { name: "구로구", code: "1153000000" }, { name: "금천구", code: "1154500000" }, { name: "노원구", code: "1135000000" },
            { name: "도봉구", code: "1132000000" }, { name: "동대문구", code: "1123000000" }, { name: "동작구", code: "1159000000" },
            { name: "마포구", code: "1144000000" }, { name: "서대문구", code: "1141000000" }, { name: "서초구", code: "1165000000" },
            { name: "성동구", code: "1120000000" }, { name: "성북구", code: "1129000000" }, { name: "송파구", code: "1171000000" },
            { name: "양천구", code: "1147000000" }, { name: "영등포구", code: "1156000000" }, { name: "용산구", code: "1117000000" },
            { name: "은평구", code: "1138000000" }, { name: "종로구", code: "1111000000" }, { name: "중구", code: "1114000000" }, { name: "중랑구", code: "1126000000" }
        ];

        const grid = document.getElementById('districtGrid');
        districts.forEach((dist, idx) => {
            const wrap = document.createElement('div');
            wrap.className = "relative";
            const isDefault = ['강남구', '마포구', '용산구', '서초구'].includes(dist.name);
            wrap.innerHTML = `
                <input type="checkbox" id="chk_${idx}" value="${dist.code}" data-name="${dist.name}" class="district-checkbox hidden" ${isDefault ? 'checked' : ''}>
                <label for="chk_${idx}" class="block text-center p-2 rounded-lg bg-slate-800 border border-slate-700/60 text-slate-300 cursor-pointer hover:border-indigo-500/50 hover:text-white transition select-none truncate">
                    ${dist.name}
                </label>
            `;
            grid.appendChild(wrap);
        });

        function selectAllDistricts(status) {
            document.querySelectorAll('.district-checkbox').forEach(chk => chk.checked = status);
        }

        // 정밀 시연 자산 풀 (상세 정보 멘트 고도화 추가)
        function generateHighlyAccurateDeals(districtName) {
            const pool = {
                "아파트": [
                    { name: "자이 프리시디움", size: "84/59", base: 14.5, desc: "역세권 대단지 랜드마크 자산으로, 소유주의 주택담보대출 리파이낸싱 실패에 따른 법인 긴급 급매물건입니다." },
                    { name: "아이파크 센트럴", size: "112/84", base: 19.8, desc: "한강 조망권이 확보된 중대형 평형으로, 다주택자 양도세 중과 배제 기한 내 처분을 위한 일시적 가격 하향 조정 자산입니다." },
                    { name: "힐스테이트 에코포레", size: "74/49", base: 11.2, desc: "주변 대규모 뉴타운 개발 호재 중심지에 위치해 있으며, 상속세 재원 마련을 위한 유가족 측의 초급매 요청 자산입니다." },
                    { name: "래미안 프라임하임", size: "84/59", base: 16.3, desc: "학군지 인접 선호도 최고 등급 단지입니다. 해외 이주 계약 체결로 인해 시장 평단가 대비 대폭 낮춘 조건으로 긴급 출회되었습니다." }
                ],
                "빌라/연립": [
                    { name: "프레시티 빌리지", size: "56/42", base: 4.2, desc: "재개발 정비구역 지정 추진 동의율 70% 돌파 구역 내 지분 물건으로, 초기 투자 자금 회수를 원치 않는 개인의 급전 마련 물건입니다." }
                ],
                "오피스텔": [
                    { name: "루체 스타뷰 메트로", size: "45/32", base: 3.5, desc: "중심업무지구(CBD) 직주근접 독점 직장인 임차 자산으로, 분양권 전매 제한 해제 직후 출회된 무피에 준하는 특가 매물입니다." }
                ]
            };

            let results = [];
            Object.keys(pool).forEach(type => {
                const items = pool[type];
                items.forEach(item => {
                    let premium = 1.0;
                    if(['강남구', '서초구'].includes(districtName)) premium = 1.6;
                    if(['용산구', '송파구', '성동구', '마포구'].includes(districtName)) premium = 1.3;
                    if(['강북구', '도봉구', '금천구'].includes(districtName)) premium = 0.8;

                    const finalBasePrice = item.base * premium;
                    
                    results.push({
                        rletTpNm: type,
                        atclNm: `[${districtName}] ${item.name}`,
                        flrInfo: `${Math.floor(Math.random() * 18) + 3}`,
                        spc1: item.size.split('/')[0],
                        spc2: item.size.split('/')[1],
                        prc: Math.round(finalBasePrice * 10000),
                        prcCc: `${Math.floor(finalBasePrice)}억 ${Math.round((finalBasePrice % 1) * 10) * 1000}만 원`,
                        description: item.desc,
                        district: districtName
                    });
                });
            });
            return results.sort(() => Math.random() - 0.5);
        }

        async function fetchDeals() {
            const checkedBoxes = document.querySelectorAll('.district-checkbox:checked');
            const discountCut = parseInt(document.getElementById('discountSelect').value);
            const container = document.getElementById('resultContainer');
            const loading = document.getElementById('loading');

            if(checkedBoxes.length === 0) {
                alert("검색 필터링을 진행할 자치구를 최소 한 개 이상 선택해 주세요!");
                return;
            }

            container.innerHTML = '';
            loading.classList.remove('hidden');

            await new Promise(resolve => setTimeout(resolve, 800));
            loading.classList.add('hidden');

            let masterDealsArray = [];
            
            checkedBoxes.forEach(box => {
                const districtName = box.getAttribute('data-name');
                masterDealsArray = masterDealsArray.concat(generateHighlyAccurateDeals(districtName));
            });

            masterDealsArray.forEach(item => {
                let calculatedDiscount = 12;
                if(discountCut === 20) calculatedDiscount = Math.floor(Math.random() * (28 - 21 + 1)) + 21;
                if(discountCut === 30) calculatedDiscount = Math.floor(Math.random() * (38 - 31 + 1)) + 31;
                if(discountCut === 10 && Math.random() > 0.5) calculatedDiscount = Math.floor(Math.random() * (19 - 13 + 1)) + 13;

                const basePrice = item.prc;
                const marketPrice = Math.round(basePrice / (1 - (calculatedDiscount / 100)));

                const card = document.createElement('div');
                // 💡 cursor-pointer와 클릭 이벤트를 추가하여 카드를 누르면 팝업이 뜨게 연동
                card.className = "bg-slate-900/40 border border-slate-800/80 p-5 rounded-2xl shadow-xl flex justify-between items-center relative hover:border-indigo-500/50 hover:bg-slate-900/80 cursor-pointer transition-all duration-300 backdrop-blur-sm group";
                
                // 카드 영역 전체 클릭 시 모달 팝업 가동 권한 부여
                card.onclick = () => openDetailModal(item, marketPrice, calculatedDiscount);

                card.innerHTML = `
                    <div>
                        <div class="flex items-center gap-2 mb-2">
                            <span class="bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 text-[11px] font-bold px-2 py-0.5 rounded-md">${item.rletTpNm}</span>
                            <h3 class="text-base font-bold text-slate-200 group-hover:text-white transition">${item.atclNm}</h3>
                        </div>
                        <p class="text-xs text-slate-400">${item.flrInfo}층 · 공급/전용: ${item.spc1}/${item.spc2}㎡</p>
                        <p class="text-sm text-slate-300 mt-2">
                            매매가 <span class="font-extrabold text-rose-400 text-base">${item.prcCc}</span> 
                            <span class="text-xs text-slate-500 ml-1">(시세 대비 저평가 단지)</span>
                        </p>
                    </div>
                    
                    <div class="relative has-tooltip select-none" onclick="event.stopPropagation()">
                        <span class="bg-gradient-to-r from-rose-500 to-amber-500 text-white text-xs font-bold px-3 py-1.5 rounded-xl shadow-md flex items-center gap-1">
                            <i class="fa-solid fa-fire text-[10px]"></i> ${calculatedDiscount}% 특가
                        </span>
                        <div class="tooltip-box absolute right-0 top-9 bg-slate-950 border border-slate-850 text-slate-300 text-xs rounded-xl p-4 w-60 z-50 shadow-2xl leading-relaxed">
                            <p class="font-bold border-b border-slate-800 pb-2 mb-2 text-rose-400 flex items-center gap-1.5">
                                <i class="fa-solid fa-triangle-exclamation"></i> 시스템 급매 시그널
                            </p>
                            <ul class="space-y-1.5 text-[11px] text-slate-400">
                                <li>• 주변 실거래가 평균 대비 <span class="text-amber-400 font-bold">${calculatedDiscount}%</span> 저평가</li>
                                <li>• 클릭 시 심층 투자 분석 정보 열람 가능</li>
                            </ul>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 팝업 모달창 열기 함수
        function openDetailModal(item, marketPrice, discount) {
            const modal = document.getElementById('detailModal');
            const content = document.getElementById('modalContent');
            
            content.innerHTML = `
                <div class="space-y-4">
                    <div class="flex items-center gap-2">
                        <span class="bg-indigo-500/20 text-indigo-400 border border-indigo-500/30 text-xs font-bold px-2.5 py-0.5 rounded-md">${item.rletTpNm}</span>
                        <span class="bg-rose-500/20 text-rose-400 border border-rose-500/30 text-xs font-bold px-2.5 py-0.5 rounded-md">${discount}% 초저평가</span>
                    </div>
                    
                    <h2 class="text-xl font-extrabold text-white">${item.atclNm} (${item.flrInfo}층)</h2>
                    
                    <div class="bg-slate-950 p-4 rounded-xl border border-slate-800/80 space-y-2 text-sm">
                        <div class="flex justify-between"><span class="text-slate-400">공급/전용 면적</span><span class="text-slate-200 font-semibold">${item.spc1}㎡ / ${item.spc2}㎡</span></div>
                        <div class="flex justify-between"><span class="text-slate-400">현재 급매 제안가</span><span class="text-rose-400 font-bold text-base">${item.prcCc}</span></div>
                        <div class="flex justify-between"><span class="text-slate-400">정상 시장 가치(시세)</span><span class="text-slate-300 font-semibold">${Math.round(marketPrice/10000)}억 원 수준</span></div>
                        <div class="flex justify-between"><span class="text-slate-400">자산 안전 마진 확보액</span><span class="text-emerald-400 font-bold">+약 ${Math.round((marketPrice - item.prc)/10000)}억 원</span></div>
                    </div>

                    <div class="space-y-1.5">
                        <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider"><i class="fa-solid fa-file-invoice-dollar text-indigo-400 mr-1"></i> AI 자산 출회 사유 분석</h4>
                        <p class="text-xs bg-slate-800/40 p-3 rounded-xl border border-slate-800 text-slate-300 leading-relaxed">${item.description}</p>
                    </div>

                    <div class="pt-3 flex gap-2">
                        <button onclick="alert('투자 심의용 기초 임장 리포트 다운로드가 완료되었습니다.')" class="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-200 font-semibold py-2.5 px-4 rounded-xl text-xs transition border border-slate-700">
                            <i class="fa-solid fa-download mr-1"></i> 심의 보고서용 다운로드
                        </button>
                        <button onclick="alert('담당 심사역 배정이 요청되었습니다. 10분 내로 메신저 연동됩니다.')" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2.5 px-4 rounded-xl text-xs shadow-lg shadow-indigo-600/10 transition">
                            <i class="fa-solid fa-phone mr-1"></i> 현장 실사역 연동
                        </button>
                    </div>
                </div>
            `;
            modal.classList.add('modal-active');
        }

        // 바깥 어두운 배경 클릭 시 팝업 닫기
        function closeModal(e) {
            document.getElementById('detailModal').classList.remove('modal-active');
        }

        window.onload = () => { fetchDeals(); };
    </script>
</body>
</html>
