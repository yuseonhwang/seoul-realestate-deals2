<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ValuX 서울: 서울 주거 자산 급매 알리미</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .tooltip-box { display: none; opacity: 0; transition: opacity 0.2s ease; }
        .has-tooltip:hover .tooltip-box { display: block; opacity: 1; }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1c1917 100%); }
        .district-checkbox:checked + label {
            background-color: rgb(249 115 22 / 0.15);
            border-color: rgb(249 115 22);
            color: #f97316;
            box-shadow: 0 0 12px rgba(249, 115, 22, 0.25);
        }
        .modal-active { display: flex !important; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .fly-up-ready {
            transform: translate3d(0, 0, 0) scale(1);
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), font-size 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s ease;
            will-change: transform, font-size;
        }
        
        .title-fly-up-active {
            position: fixed !important;
            left: 50% !important;
            top: 40px !important;
            transform: translate3d(-50%, 0, 0) scale(0.55) !important;
            z-index: 100;
        }

        @media print {
            @page { size: A4 landscape; margin: 10mm; }
            body * { visibility: hidden; }
            #detailModal, #detailModal * { visibility: visible; }
            #detailModal { position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
</head>
<body class="gradient-bg text-slate-100 font-sans min-h-screen p-4 flex items-center justify-center">

    <div id="introCover" class="max-w-4xl w-full bg-slate-900/50 border border-slate-800 p-16 rounded-3xl text-center space-y-10 backdrop-blur-xl transition-all duration-700 shadow-2xl">
        <h1 id="introTitle" class="text-7xl font-black bg-gradient-to-r from-white to-orange-400 bg-clip-text text-transparent fly-up-ready">ValuX 서울</h1>
        <p id="introSub" class="text-sm text-orange-400 font-bold tracking-widest uppercase">Value Maximize & eXtract</p>
        <p class="text-base text-slate-400 leading-relaxed max-w-2xl mx-auto">
            ValuX 서울은 서울 주거용 부동산 중 시세 대비 저평가된 진짜 급매물만 엄선하여 빠르게 알려드립니다. 
            불필요한 탐색은 줄이고, 검증된 자산 가치에 집중하세요.
        </p>
        <div class="grid grid-cols-3 gap-6 text-left">
            <div class="bg-slate-950/60 p-6 rounded-2xl border border-slate-800"><i class="fa-solid fa-bolt text-orange-400 mb-4 block text-xl"></i><h4 class="text-sm font-bold mb-2">실시간 급매 스캔</h4><p class="text-xs text-slate-500">25개 자치구의 급매 데이터를 실시간으로 추적합니다.</p></div>
            <div class="bg-slate-950/60 p-6 rounded-2xl border border-slate-800"><i class="fa-solid fa-scale-balanced text-orange-400 mb-4 block text-xl"></i><h4 class="text-sm font-bold mb-2">시세 괴리율 분석</h4><p class="text-xs text-slate-500">주변 실거래가와 비교하여 저평가 자산만 선별합니다.</p></div>
            <div class="bg-slate-950/60 p-6 rounded-2xl border border-slate-800"><i class="fa-solid fa-file-pdf text-orange-400 mb-4 block text-xl"></i><h4 class="text-sm font-bold mb-2">가치 진단 리포트</h4><p class="text-xs text-slate-500">가로형 1페이지 진단서로 의사결정을 지원합니다.</p></div>
        </div>
        <button onclick="enterDashboardWithAnim()" class="bg-orange-600 px-12 py-4 rounded-xl font-bold text-sm shadow-xl hover:bg-orange-500 transition active:scale-[0.98]">엔진 가동 및 매물 확인하기</button>
    </div>

    <div id="mainContent" class="max-w-4xl w-full mx-auto p-4 hidden opacity-0 transition-opacity duration-500">
        <div id="mainTitlePlaceholder" class="h-16 flex justify-center items-center mb-6"></div>
        <div id="filterSection" class="bg-slate-900/60 border border-slate-800 p-6 rounded-2xl mb-6">
            <div id="districtGrid" class="grid grid-cols-5 sm:grid-cols-8 gap-2 text-[10px] mb-4"></div>
            <select id="discountSelect" class="bg-slate-800 border border-slate-700 rounded-lg p-2 text-xs w-full mb-2">
                <option value="10">10% 이상 괴리</option>
                <option value="20" selected>20% 이상 격차</option>
                <option value="30">30% 이상 초급매</option>
            </select>
            <button onclick="fetchDeals()" class="w-full bg-orange-600 py-3 rounded-lg text-xs font-bold">스캔 시작</button>
        </div>
        <div id="resultContainer" class="space-y-3"></div>
    </div>

    <div id="detailModal" class="fixed inset-0 bg-slate-950/90 z-50 justify-center items-center hidden p-4" onclick="closeModal()">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl max-w-4xl w-full shadow-2xl max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        const districts = [
            { name: "강남구", code: "11680" }, { name: "서초구", code: "11650" }, { name: "송파구", code: "11710" }, 
            { name: "마포구", code: "11440" }, { name: "용산구", code: "11170" }, { name: "성동구", code: "11200" },
            { name: "강동구", code: "11740" }, { name: "양천구", code: "11470" }
        ];

        let currentFetchedDeals = [];

        function formatAssetPrice(val) {
            const raw = Math.floor(val);
            const rem = Math.round((val - raw) * 10000);
            return rem === 0 ? `${raw}억 원` : `${raw}억 ${rem.toLocaleString()}만 원`;
        }

        document.getElementById('districtGrid').innerHTML = districts.map((d, i) => 
            `<input type="checkbox" id="chk_${i}" value="${d.code}" data-name="${d.name}" class="district-checkbox hidden" checked>
             <label for="chk_${i}" class="block text-center p-1.5 rounded bg-slate-800 border border-slate-700 text-[10px] cursor-pointer hover:border-orange-500">${d.name}</label>`
        ).join('');

        function enterDashboardWithAnim() {
            const intro = document.getElementById('introCover'), main = document.getElementById('mainContent'), title = document.getElementById('introTitle'), place = document.getElementById('mainTitlePlaceholder');
            title.classList.add('title-fly-up-active');
            setTimeout(() => {
                intro.style.display = 'none';
                main.classList.remove('hidden');
                setTimeout(() => {
                    main.classList.remove('opacity-0');
                    title.classList.remove('title-fly-up-active', 'fly-up-ready');
                    title.className = "text-4xl font-black bg-gradient-to-r from-white to-orange-400 bg-clip-text text-transparent inline-block";
                    place.appendChild(title);
                    fetchDeals();
                }, 100);
            }, 800);
        }

        async function fetchDeals() {
            const container = document.getElementById('resultContainer');
            // 예시 데이터
            currentFetchedDeals = [
                { id:0, name: "[강남구] 자이 프리시디움", prc: "23억 2,000만 원", margin: 27, score: 76, desc: "대출 규제 및 개인 사정으로 출회된 초급매물. 주변 신축 대비 압도적인 안전마진 확보.", area: "84㎡", floor: "20층", compPrice: "32억 원", infra: "역세권 대단지", status: "즉시 입주 가능" },
                { id:1, name: "[마포구] 아이파크 센트럴", prc: "19억 원", margin: 22, score: 88, desc: "다주택자 처분 물건으로 급처분 목적의 알짜 자산입니다.", area: "112㎡", floor: "15층", compPrice: "22억 원", infra: "한강 조망권", status: "전세 승계 조건" }
            ];
            
            container.innerHTML = currentFetchedDeals.map(item => `
                <div class="bg-slate-900 border border-slate-800 p-5 rounded-xl flex justify-between items-center cursor-pointer hover:border-orange-500 transition text-xs" onclick="openDetailModal(${item.id})">
                    <div>
                        <div class="text-orange-500 font-bold mb-1">AI 투자 추천</div>
                        <div class="font-bold text-sm">${item.name}</div>
                        <div class="text-slate-400">시세 괴리율 -${item.margin}% | AI 스코어: ${item.score}점</div>
                    </div>
                    <div class="font-bold text-orange-400 text-base">${item.prc}</div>
                </div>
            `).join('');
        }

        function openDetailModal(id) {
            const item = currentFetchedDeals[id];
            document.getElementById('modalContent').innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 text-xs">
                    <div>
                        <h2 class="text-xl font-black text-white mb-6 border-b border-slate-800 pb-4">${item.name}</h2>
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800"><span class="text-slate-500 block">시세 괴리율</span><span class="text-lg font-bold text-orange-400">${item.margin}%</span></div>
                            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800"><span class="text-slate-500 block">AI 종합 점수</span><span class="text-lg font-bold text-emerald-400">${item.score}점</span></div>
                        </div>
                        <p class="text-slate-300 leading-relaxed bg-slate-800 p-4 rounded-xl mb-4">${item.desc}</p>
                    </div>
                    <div class="bg-slate-950 p-6 rounded-2xl border border-slate-800">
                        <h3 class="font-bold mb-4 text-sm border-b border-slate-800 pb-2">상세 자산 가치 리포트</h3>
                        <div class="space-y-4 text-slate-400">
                            <div class="flex justify-between"><span>공급면적</span><span class="text-white font-bold">${item.area}</span></div>
                            <div class="flex justify-between"><span>해당층수</span><span class="text-white font-bold">${item.floor}</span></div>
                            <div class="flex justify-between"><span>인근 적정시세</span><span class="text-white font-bold">${item.compPrice}</span></div>
                            <div class="flex justify-between"><span>주변 인프라</span><span class="text-white font-bold">${item.infra}</span></div>
                            <div class="flex justify-between"><span>계약 상태</span><span class="text-white font-bold">${item.status}</span></div>
                        </div>
                    </div>
                </div>
                <button onclick="closeModal()" class="mt-8 w-full bg-orange-600 py-3 rounded-xl font-bold text-sm hover:bg-orange-500 transition">리포트 확인 완료</button>
            `;
            document.getElementById('detailModal').classList.add('modal-active');
        }
        function closeModal() { document.getElementById('detailModal').classList.remove('modal-active'); }
    </script>
</body>
</html>
