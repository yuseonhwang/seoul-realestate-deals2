<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ValuX 서울: 서울 주거 자산 급매 알리미</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .tooltip-box { display: none; opacity: 0; transition: opacity 0.2s ease; }
        .has-tooltip:hover .tooltip-box { display: block; opacity: 1; }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1c1917 100%); }
        .district-checkbox:checked + label {
            background-color: rgb(249 115 22 / 0.15);
            border-color: rgb(249 115 22);
            color: #f97316;
            box-shadow: 0 0 12px rgba(249, 115, 22, 0.25);
        }
        .modal-active { display: flex !important; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .fly-up-ready {
            transform: translate3d(0, 0, 0) scale(1);
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), font-size 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s ease;
            will-change: transform, font-size;
        }
        
        .title-fly-up-active {
            position: fixed !important;
            left: 50% !important;
            top: 40px !important;
            transform: translate3d(-50%, 0, 0) scale(0.55) !important;
            z-index: 100;
        }

        @media print {
            @page { size: A4 landscape; margin: 10mm; }
            html, body { background: #0f172a !important; color: white !important; height: auto !important; min-height: auto !important; overflow: hidden !important; }
            body * { visibility: hidden; height: 0 !important; overflow: hidden !important; margin: 0 !important; padding: 0 !important; }
            #detailModal, #detailModal * { visibility: visible; height: auto !important; overflow: visible !important; }
            #detailModal { position: absolute !important; left: 0 !important; top: 0 !important; width: 100% !important; background: #0f172a !important; display: block !important; border: none !important; padding: 0 !important; margin: 0 !important; }
            #detailModal > div { background: transparent !important; border: none !important; max-width: 100% !important; width: 100% !important; padding: 0 !important; margin: 0 !important; box-shadow: none !important; }
            .action-buttons, .fa-xmark, #realtimeStatusDashboard, #filterSection, #tabSortContainer, #introCover { display: none !important; }
            .print-grid { display: grid !important; grid-template-cols: repeat(2, minmax(0, 1fr)) !important; gap: 20px !important; }
        }
    </style>
</head>
<body class="gradient-bg text-slate-100 font-sans min-h-screen antialiased selection:bg-orange-500 selection:text-white flex items-center justify-center p-4">

    <div id="introCover" class="max-w-2xl w-full bg-slate-900/40 border border-slate-800/80 p-8 sm:p-10 rounded-3xl shadow-2xl text-center space-y-8 backdrop-blur-xl transition-all duration-700 relative">
        <div class="space-y-3">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-orange-500/10 border border-orange-500/20 text-orange-400 text-xs font-semibold">
                <i class="fa-solid fa-home"></i> 서울 전역 실시간 급매물 트래커
            </div>
            <div id="introTitleWrapper" class="relative h-16 flex items-center justify-center">
                <h1 id="introTitle" class="text-5xl font-black tracking-tight bg-gradient-to-r from-white via-slate-100 to-orange-400 bg-clip-text text-transparent py-1 select-none fly-up-ready">
                    ValuX 서울
                </h1>
            </div>
            <p id="introSub" class="text-xs text-orange-400 font-bold tracking-widest uppercase transition-all duration-500">
                Value <span class="text-slate-400 font-normal">Maximize</span> &amp; eXtract
            </p>
        </div>

        <div id="introBody" class="space-y-6 transition-all duration-500">
            <p class="text-xs sm:text-sm text-slate-400 leading-relaxed max-w-md mx-auto">
                ValuX 서울은 서울 주거용 부동산 중 <strong class="text-slate-200 font-semibold">시세 대비 저렴하게 나온 진짜 급매물만 엄선하여 빠르게 알려주는 서비스</strong>입니다.
            </p>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 text-left pt-2">
                <div class="bg-slate-950/60 border border-slate-800/50 p-4 rounded-xl"><i class="fa-solid fa-bolt text-orange-400 mb-2 block text-base"></i><h4 class="text-xs font-bold text-slate-200 mb-1">실시간 급매 스캔</h4><p class="text-[11px] text-slate-500 leading-normal">서울 25개 자치구 데이터를 실시간 추적합니다.</p></div>
                <div class="bg-slate-950/60 border border-slate-800/50 p-4 rounded-xl"><i class="fa-solid fa-scale-balanced text-orange-400 mb-2 block text-base"></i><h4 class="text-xs font-bold text-slate-200 mb-1">시세 괴리율 분석</h4><p class="text-[11px] text-slate-500 leading-normal">주변 시세와 직접 비교하여 급매물을 판정합니다.</p></div>
                <div class="bg-slate-950/60 border border-slate-800/50 p-4 rounded-xl"><i class="fa-solid fa-file-pdf text-orange-400 mb-2 block text-base"></i><h4 class="text-xs font-bold text-slate-200 mb-1">1장 요약 리포트</h4><p class="text-[11px] text-slate-500 leading-normal">가로형 1페이지 진단서를 즉시 발급합니다.</p></div>
            </div>
            <button onclick="enterDashboardWithAnim()" class="w-full sm:w-auto bg-gradient-to-r from-orange-600 to-amber-600 text-white font-bold py-3.5 px-10 rounded-xl shadow-lg transition active:scale-[0.98] flex justify-center items-center gap-2 mx-auto text-sm">
                엔진 가동 및 매물 확인하기 <i class="fa-solid fa-circle-arrow-right"></i>
            </button>
        </div>
    </div>

    <div id="mainContent" class="max-w-4xl w-full mx-auto p-2 hidden opacity-0 transition-all duration-700">
        <header class="mb-8 text-center pt-4">
            <div id="mainBadge" class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-orange-500/10 border border-orange-500/20 text-orange-400 text-xs font-semibold mb-4 opacity-0 transition-opacity">실시간 트래커 가동 중</div>
            <div id="mainTitlePlaceholder" class="h-14 mb-3"></div>
        </header>
        <div id="filterSection" class="bg-slate-900/60 border border-slate-800 p-6 rounded-2xl mb-6">
            <div id="districtGrid" class="grid grid-cols-5 gap-2 text-xs mb-4"></div>
            <select id="discountSelect" class="bg-slate-800 border border-slate-700 rounded-lg p-2 text-xs w-full mb-2"><option value="20" selected>20% 이상 격차</option></select>
            <button onclick="fetchDeals()" class="w-full bg-orange-600 text-white font-bold py-2 rounded-lg text-xs">스캔 가동</button>
        </div>
        <div id="resultContainer" class="space-y-3"></div>
    </div>

    <div id="detailModal" class="fixed inset-0 bg-slate-950/80 z-50 justify-center items-center hidden p-4" onclick="closeModal()">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl max-w-4xl w-full shadow-2xl max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        const districts = [
            { name: "강남구", code: "11680" }, { name: "강동구", code: "11740" }, { name: "강북구", code: "11305" }, 
            { name: "강서구", code: "11500" }, { name: "관악구", code: "11620" }, { name: "광진구", code: "11215" },
            { name: "구로구", code: "11530" }, { name: "금천구", code: "11545" }, { name: "노원구", code: "11350" },
            { name: "도봉구", code: "11320" }, { name: "동대문구", code: "11230" }, { name: "동작구", code: "11590" },
            { name: "마포구", code: "11440" }, { name: "서대문구", code: "11410" }, { name: "서초구", code: "11650" },
            { name: "성동구", code: "11200" }, { name: "성북구", code: "11290" }, { name: "송파구", code: "11710" },
            { name: "양천구", code: "11470" }, { name: "영등포구", code: "11560" }, { name: "용산구", code: "11170" },
            { name: "은평구", code: "11380" }, { name: "종로구", code: "11110" }, { name: "중구", code: "11140" }, { name: "중랑구", code: "11260" }
        ];

        let currentFetchedDeals = [];

        // 자치구 렌더링
        const grid = document.getElementById('districtGrid');
        districts.forEach((d, i) => {
            grid.innerHTML += `<input type="checkbox" id="chk_${i}" class="hidden" checked><label for="chk_${i}" class="block text-center p-2 rounded bg-slate-800 border border-slate-700 cursor-pointer text-[10px]">${d.name}</label>`;
        });

        function enterDashboardWithAnim() {
            const intro = document.getElementById('introCover'), main = document.getElementById('mainContent'), title = document.getElementById('introTitle'), place = document.getElementById('mainTitlePlaceholder');
            title.classList.add('title-fly-up');
            setTimeout(() => {
                intro.style.display = 'none';
                main.classList.remove('hidden');
                setTimeout(() => {
                    main.classList.remove('opacity-0');
                    title.classList.remove('title-fly-up', 'fly-up-ready');
                    title.className = "text-4xl font-black bg-gradient-to-r from-white to-orange-400 bg-clip-text text-transparent inline-block";
                    place.appendChild(title);
                    fetchDeals();
                }, 100);
            }, 800);
        }

        async function fetchDeals() {
            // 원본 로직 유지
            currentFetchedDeals = [
                { id: 0, name: "[강남구] 자이 프리시디움", prc: "23억 2,000만 원", margin: 27, score: 76, desc: "대출 규제 및 개인 사정으로 출회된 초급매물.", area: "84㎡", floor: "20층", comp: "32억 원", infra: "역세권", status: "입주가능" },
                { id: 1, name: "[마포구] 아이파크 센트럴", prc: "19억 원", margin: 22, score: 88, desc: "다주택자 처분 물건으로 급처분 목적의 알짜 자산.", area: "112㎡", floor: "15층", comp: "22억 원", infra: "한강조망", status: "전세승계" }
            ];
            renderDeals();
        }

        function renderDeals() {
            const container = document.getElementById('resultContainer');
            container.innerHTML = currentFetchedDeals.map(item => `
                <div class="bg-slate-900 border border-slate-800 p-5 rounded-xl flex justify-between cursor-pointer hover:border-orange-500" onclick="openDetailModal(${item.id})">
                    <div class="text-xs font-bold">${item.name}<div class="text-slate-400 font-normal">괴리율 -${item.margin}%</div></div>
                    <div class="font-bold text-orange-400 text-sm">${item.prc}</div>
                </div>
            `).join('');
        }

        function openDetailModal(id) {
            const item = currentFetchedDeals[id];
            document.getElementById('modalContent').innerHTML = `
                <div class="grid grid-cols-2 gap-6 text-sm">
                    <div><h2 class="text-xl font-black mb-4">${item.name}</h2><p class="text-slate-400 bg-slate-800 p-4 rounded">${item.desc}</p></div>
                    <div class="space-y-2 text-slate-300">
                        <div class="flex justify-between border-b border-slate-700 py-2"><span>공급면적</span><span class="font-bold">${item.area}</span></div>
                        <div class="flex justify-between border-b border-slate-700 py-2"><span>층수</span><span class="font-bold">${item.floor}</span></div>
                        <div class="flex justify-between border-b border-slate-700 py-2"><span>주변시세</span><span class="font-bold">${item.comp}</span></div>
                    </div>
                </div>
                <button onclick="closeModal()" class="mt-8 w-full bg-orange-600 py-3 rounded-xl font-bold">닫기</button>
            `;
            document.getElementById('detailModal').classList.add('modal-active');
        }

        function closeModal() { document.getElementById('detailModal').classList.remove('modal-active'); }
    </script>
</body>
</html>
