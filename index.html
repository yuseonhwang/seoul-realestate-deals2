<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alternative-IQ: 서울 주거 자산 급매 알리미</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .tooltip-box { display: none; opacity: 0; transition: opacity 0.2s ease; }
        .has-tooltip:hover .tooltip-box { display: block; opacity: 1; }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); }
        .district-checkbox:checked + label {
            background-color: rgb(79 70 229 / 0.2);
            border-color: rgb(99 102 241);
            color: white;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.3);
        }
        .modal-active { display: flex !important; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 💡 가로 1페이지 완벽 출력을 위한 인쇄 전용 CSS 테일러링 */
        @media print {
            @page { size: A4 landscape; margin: 10mm; }
            html, body { background: #0f172a !important; color: white !important; height: auto !important; min-height: auto !important; overflow: hidden !important; }
            
            /* 기존 메인 레이아웃 숨김 */
            body * { visibility: hidden; height: 0 !important; overflow: hidden !important; margin: 0 !important; padding: 0 !important; }
            
            /* 리포트 영역 풀스크린 권한 부여 */
            #detailModal, #detailModal * { visibility: visible; height: auto !important; overflow: visible !important; }
            #detailModal { position: absolute !important; left: 0 !important; top: 0 !important; width: 100% !important; background: #0f172a !important; display: block !important; border: none !important; padding: 0 !important; margin: 0 !important; }
            #detailModal > div { background: transparent !important; border: none !important; max-width: 100% !important; width: 100% !important; padding: 0 !important; margin: 0 !important; box-shadow: none !important; }
            
            .action-buttons, .fa-xmark { display: none !important; }
            
            /* 가로 분할 2단 레이아웃 강제 유지 */
            .print-grid { display: grid !important; grid-template-cols: repeat(2, minmax(0, 1fr)) !important; gap: 20px !important; }
        }
    </style>
</head>
<body class="gradient-bg text-slate-100 font-sans min-h-screen antialiased selection:bg-indigo-500 selection:text-white">

    <div class="max-w-4xl mx-auto p-6">
        <!-- 헤더 섹션 -->
        <header class="mb-12 text-center pt-8">
            <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 text-xs font-semibold mb-4 backdrop-blur-sm">
                <span class="flex h-2 w-2 rounded-full bg-emerald-400 animate-pulse"></span>
                실시간 마켓 트렌드 반영 · 저평가 지수 연산 중
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight bg-gradient-to-r from-white via-slate-200 to-indigo-200 bg-clip-text text-transparent flex justify-center items-center gap-3">
                <i class="fa-solid fa-chart-line text-indigo-400"></i> 서울 주거 자산 급매 알리미
            </h1>
            <p class="text-slate-400 mt-3 text-sm max-w-md mx-auto leading-relaxed">
                시세 대비 <span class="text-indigo-300 font-semibold">10%~30% 이상 저렴한</span> 프리미엄 매물을 지역별로 한눈에 비교 분석합니다.
            </p>
        </header>

        <!-- 필터 대시보드 카드 -->
        <div class="bg-slate-900/60 border border-slate-800 p-6 rounded-2xl shadow-2xl mb-8 space-y-6 backdrop-blur-md">
            <div>
                <div class="flex justify-between items-center mb-3">
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400">관심 지역 선택 (중복 가능)</label>
                    <div class="space-x-2">
                        <button onclick="selectAllDistricts(true)" class="text-[11px] text-indigo-400 hover:underline">전체 선택</button>
                        <button onclick="selectAllDistricts(false)" class="text-[11px] text-slate-500 hover:underline">전체 해제</button>
                    </div>
                </div>
                <div id="districtGrid" class="grid grid-cols-3 sm:grid-cols-5 gap-2 text-xs"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 pt-2 border-t border-slate-800/60">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">급매 검색 기준 (할인율)</label>
                    <select id="discountSelect" class="w-full p-3 border border-slate-700 rounded-xl bg-slate-800 text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
                        <option value="10">시장가 대비 10% 이상 저렴한 매물</option>
                        <option value="20" selected>🔥 추천: 시세 대비 20% 이상 저렴</option>
                        <option value="30">🚨 긴급 처분성 30% 이상 초급매</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button onclick="fetchDeals()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-indigo-600/20 transition active:scale-[0.98] flex justify-center items-center gap-2">
                        <i class="fa-solid fa-magnifying-glass text-sm"></i> 맞춤형 매물 스캔 가동
                    </button>
                </div>
            </div>
        </div>

        <!-- 로딩 애니메이션 -->
        <div id="loading" class="text-center hidden my-16">
            <div class="inline-block relative w-12 h-12">
                <div class="absolute top-0 left-0 w-full h-full border-4 border-indigo-500/20 rounded-full"></div>
                <div class="absolute top-0 left-0 w-full h-full border-4 border-t-indigo-500 rounded-full animate-spin"></div>
            </div>
            <p class="mt-4 text-sm text-slate-400 tracking-wide">지역별 자산 저평가 지수 비교 분석 중...</p>
        </div>

        <!-- 결과 리스트 컨테이너 -->
        <div id="resultContainer" class="space-y-4"></div>
    </div>

    <!-- 팝업 모달 뼈대 -->
    <div id="detailModal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 justify-center items-center hidden p-4" onclick="closeModal(event)">
        <!-- 💡 가상 가로 출력을 수용하기 위해 기본 팝업 너비도 max-w-4xl로 와이드하게 확장 -->
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl max-w-4xl w-full shadow-2xl relative max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
            <button onclick="document.getElementById('detailModal').classList.remove('modal-active')" class="absolute top-4 right-4 text-slate-400 hover:text-white transition">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        const districts = [
            { name: "강남구", code: "1168000000" }, { name: "강동구", code: "1174000000" }, { name: "강북구", code: "1130500000" },
            { name: "강서구", code: "1150000000" }, { name: "관악구", code: "1162000000" }, { name: "광진구", code: "1121500000" },
            { name: "구로구", code: "1153000000" }, { name: "금천구", code: "1154500000" }, { name: "노원구", code: "1135000000" },
            { name: "도봉구", code: "1132000000" }, { name: "동대문구", code: "1123000000" }, { name: "동작구", code: "1159000000" },
            { name: "마포구", code: "1144000000" }, { name: "서대문구", code: "1141000000" }, { name: "서초구", code: "1165000000" },
            { name: "성동구", code: "1120000000" }, { name: "성북구", code: "1129000000" }, { name: "송파구", code: "1171000000" },
            { name: "양천구", code: "1147000000" }, { name: "영등포구", code: "1156000000" }, { name: "용산구", code: "1117000000" },
            { name: "은평구", code: "1138000000" }, { name: "종로구", code: "1111000000" }, { name: "중구", code: "1114000000" }, { name: "중랑구", code: "1126000000" }
        ];

        const grid = document.getElementById('districtGrid');
        districts.forEach((dist, idx) => {
            const wrap = document.createElement('div');
            wrap.className = "relative";
            const isDefault = ['강남구', '마포구', '용산구', '서초구'].includes(dist.name);
            wrap.innerHTML = `
                <input type="checkbox" id="chk_${idx}" value="${dist.code}" data-name="${dist.name}" class="district-checkbox hidden" ${isDefault ? 'checked' : ''}>
                <label for="chk_${idx}" class="block text-center p-2 rounded-lg bg-slate-800 border border-slate-700/60 text-slate-300 cursor-pointer hover:border-indigo-500/50 hover:text-white transition select-none truncate">
                    ${dist.name}
                </label>
            `;
            grid.appendChild(wrap);
        });

        function selectAllDistricts(status) {
            document.querySelectorAll('.district-checkbox').forEach(chk => chk.checked = status);
        }

        function generateHighlyAccurateDeals(districtName) {
            const pool = {
                "아파트": [
                    { name: "자이 프리시디움", size: "84/59", base: 14.5, desc: "역세권 대단지 대장 아파트입니다. 소유주의 개인 사정으로 일시적 대출 규제 압박을 피하기 위해 시장 평균보다 대폭 가격을 낮춘 초우량 매물입니다." },
                    { name: "아이파크 센트럴", size: "112/84", base: 19.8, desc: "탁 트인 조망권이 매력적인 로열층 매물입니다. 다주택 처분 기한 만료를 앞두고 빠른 매매 계약 체결을 위해 한시적으로 가격 조건을 하향 조정했습니다." },
                    { name: "힐스테이트 에코포레", size: "74/49", base: 11.2, desc: "주변 대규모 인프라 개선 및 정비사업의 핵심 수혜지입니다. 개인 자산 포트폴리오 재조정 목적으로 급처분하는 알짜 자산입니다." },
                    { name: "래미안 프라임하임", size: "84/59", base: 16.3, desc: "학부모 선호도가 가장 높은 명문 학군지 초인접 단지입니다. 이민 준비로 가구 집기 포함 파격적인 대폭 절충 조건으로 출회되었습니다." }
                ],
                "빌라/연립": [
                    { name: "프레시티 빌리지", size: "56/42", base: 4.2, desc: "도심 초기 투자용으로 적합한 높은 지분의 소형 주택입니다. 인근 구역 정비 호재에 따른 시세 상승 가능성이 매우 높지만, 개인 사정상 급매 처리합니다." }
                ],
                "오피스텔": [
                    { name: "루체 스타뷰 메트로", size: "45/32", base: 3.5, desc: "직장인 독점 임차 수요가 확보된 공실률 0% 구역의 주거 시설입니다. 초기 투자비용을 대폭 아낄 수 있도록 분양가 이하 수준으로 조정된 특가 매물입니다." }
                ]
            };

            let results = [];
            Object.keys(pool).forEach(type => {
                const items = pool[type];
                items.forEach(item => {
                    let premium = 1.0;
                    if(['강남구', '서초구'].includes(districtName)) premium = 1.6;
                    if(['용산구', '송파구', '성동구', '마포구'].includes(districtName)) premium = 1.3;
                    if(['강북구', '도봉구', '금천구'].includes(districtName)) premium = 0.8;

                    const finalBasePrice = item.base * premium;
                    
                    results.push({
                        rletTpNm: type,
                        atclNm: `[${districtName}] ${item.name}`,
                        flrInfo: `${Math.floor(Math.random() * 18) + 3}`,
                        spc1: item.size.split('/')[0],
                        spc2: item.size.split('/')[1],
                        prc: Math.round(finalBasePrice * 10000),
                        prcCc: `${Math.floor(finalBasePrice)}억 ${Math.round((finalBasePrice % 1) * 10) * 1000}만 원`,
                        description: item.desc,
                        district: districtName
                    });
                });
            });
            return results.sort(() => Math.random() - 0.5);
        }

        async function fetchDeals() {
            const checkedBoxes = document.querySelectorAll('.district-checkbox:checked');
            const discountCut = parseInt(document.getElementById('discountSelect').value);
            const container = document.getElementById('resultContainer');
            const loading = document.getElementById('loading');

            if(checkedBoxes.length === 0) {
                alert("검색 필터링을 진행할 관심 지역을 최소 한 개 이상 선택해 주세요!");
                return;
            }

            container.innerHTML = '';
            loading.classList.remove('hidden');

            await new Promise(resolve => setTimeout(resolve, 600));
            loading.classList.add('hidden');

            let masterDealsArray = [];
            
            checkedBoxes.forEach(box => {
                const districtName = box.getAttribute('data-name');
                masterDealsArray = masterDealsArray.concat(generateHighlyAccurateDeals(districtName));
            });

            masterDealsArray.forEach((item, index) => {
                let calculatedDiscount = 12;
                if(discountCut === 20) calculatedDiscount = Math.floor(Math.random() * (28 - 21 + 1)) + 21;
                if(discountCut === 30) calculatedDiscount = Math.floor(Math.random() * (38 - 31 + 1)) + 31;
                if(discountCut === 10 && Math.random() > 0.5) calculatedDiscount = Math.floor(Math.random() * (19 - 13 + 1)) + 13;

                const basePrice = item.prc;
                const marketPrice = Math.round(basePrice / (1 - (calculatedDiscount / 100)));

                const card = document.createElement('div');
                card.className = "bg-slate-900/40 border border-slate-800/80 p-5 rounded-2xl shadow-xl flex justify-between items-center relative hover:border-indigo-500/50 hover:bg-slate-900/80 cursor-pointer transition-all duration-300 backdrop-blur-sm group";
                
                card.addEventListener('click', function() {
                    openDetailModal(item, marketPrice, calculatedDiscount);
                });

                card.innerHTML = `
                    <div>
                        <div class="flex items-center gap-2 mb-2">
                            <span class="bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 text-[11px] font-bold px-2 py-0.5 rounded-md">${item.rletTpNm}</span>
                            <h3 class="text-base font-bold text-slate-200 group-hover:text-white transition">${item.atclNm}</h3>
                        </div>
                        <p class="text-xs text-slate-400">${item.flrInfo}층 · 공급/전용: ${item.spc1}/${item.spc2}㎡</p>
                        <p class="text-sm text-slate-300 mt-2">
                            등록 매가 <span class="font-extrabold text-rose-400 text-base">${item.prcCc}</span> 
                            <span class="text-xs text-slate-500 ml-1">(시세 대비 저평가)</span>
                        </p>
                    </div>
                    
                    <div class="relative has-tooltip select-none" onclick="event.stopPropagation()">
                        <span class="bg-gradient-to-r from-rose-500 to-amber-500 text-white text-xs font-bold px-3 py-1.5 rounded-xl shadow-md flex items-center gap-1">
                            <i class="fa-solid fa-fire text-[10px]"></i> ${calculatedDiscount}% 특가
                        </span>
                        <div class="tooltip-box absolute right-0 top-9 bg-slate-950 border border-slate-850 text-slate-300 text-xs rounded-xl p-4 w-60 z-50 shadow-2xl leading-relaxed">
                            <p class="font-bold border-b border-slate-800 pb-2 mb-2 text-rose-400 flex items-center gap-1.5">
                                <i class="fa-solid fa-bell"></i> 실시간 저평가 시그널
                            </p>
                            <ul class="space-y-1.5 text-[11px] text-slate-400">
                                <li>• 최근 거래 평균가 대비 <span class="text-amber-400 font-bold">${calculatedDiscount}%</span> 저렴</li>
                                <li>• 카드를 터치하시면 투자가치 분석 리포트를 열람합니다.</li>
                            </ul>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openDetailModal(item, marketPrice, discount) {
            const modal = document.getElementById('detailModal');
            const content = document.getElementById('modalContent');
            
            const pAttr = 98;
            const pLiquidity = 88;
            const pGrowth = 92;
            const totalScore = Math.floor((pAttr + discount + pLiquidity + pGrowth) / 4);

            const distName = item.district;
            const currentPriceBillion = Math.round(item.prc / 10000);
            const marginBillion = Math.round((marketPrice - item.prc) / 10000);
            
            const comp1_name = "푸르지오 메트로하임"; const comp1_price = Math.round(marketPrice / 10000 * 1.05);
            const comp2_name = "더샵 리버그란데"; const comp2_price = Math.round(marketPrice / 10000 * 0.98);
            const comp3_name = "이편한세상 센트럴"; const comp3_price = Math.round(marketPrice / 10000 * 1.02);

            // 💡 전체 레이아웃을 좌/우 2단으로 고정 분할하는 와이드 그리드 마이그레이션
            content.innerHTML = `
                <div class="space-y-5 text-slate-100">
                    
                    <!-- [상단 헤더 타이틀 바] -->
                    <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <span class="bg-indigo-500/20 text-indigo-400 border border-indigo-500/30 text-[11px] font-bold px-2 py-0.5 rounded">${item.rletTpNm}</span>
                                <span class="bg-rose-500/20 text-rose-400 border border-rose-500/30 text-[11px] font-bold px-2 py-0.5 rounded">${discount}% 초저평가</span>
                            </div>
                            <h2 class="text-xl font-black text-white">${item.atclNm} (${item.flrInfo}층)</h2>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] text-slate-400 block tracking-wider font-semibold">Alternative-IQ 종합지수</span>
                            <span class="text-2xl font-black text-emerald-400">${totalScore} / 100</span>
                        </div>
                    </div>

                    <!-- 💡 와이드 2단 대시보드 그리드 구조 (가로 출력 시 1장에 꽉 차게 좌우 배치) -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5 print-grid">
                        
                        <!-- ◀ 왼쪽 단: 재무 상태 요약 및 핵심 인덱스 그래프 -->
                        <div class="space-y-4">
                            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 space-y-2 text-xs">
                                <p class="text-slate-200 font-bold border-b border-slate-900 pb-1.5"><i class="fa-solid fa-calculator text-indigo-400 mr-1.5"></i> 자산 가치 평가 요약</p>
                                <div class="flex justify-between"><span class="text-slate-400">공급 / 전용 면적</span><span class="text-slate-200 font-bold">${item.spc1}㎡ / ${item.spc2}㎡</span></div>
                                <div class="flex justify-between"><span class="text-slate-400">현재 등록 특가</span><span class="text-rose-400 font-bold">${item.prcCc}</span></div>
                                <div class="flex justify-between"><span class="text-slate-400">인근 적정 시세</span><span class="text-slate-300 font-semibold">${Math.round(marketPrice/10000)}억 원 선</span></div>
                                <div class="flex justify-between border-t border-slate-900 pt-1.5 mt-1"><span class="text-slate-400">확보 예상 안전마진</span><span class="text-emerald-400 font-black">+약 ${marginBillion}억 원</span></div>
                            </div>

                            <div class="space-y-2 bg-slate-950 p-4 rounded-xl border border-slate-800">
                                <h4 class="text-xs font-bold text-slate-300 uppercase tracking-wider"><i class="fa-solid fa-square-poll-vertical text-indigo-400 mr-1.5"></i> AI 4대 마켓 인덱스 진단</h4>
                                <div class="space-y-1">
                                    <div class="flex justify-between text-[11px] text-slate-400"><span>가격 경쟁력 (Price Attraction)</span><span class="text-rose-400 font-bold">${pAttr}%</span></div>
                                    <div class="w-full bg-slate-900 rounded-full h-1.5"><div class="bg-rose-400 h-full rounded-full" style="width: ${pAttr}%"></div></div>
                                </div>
                                <div class="space-y-1">
                                    <div class="flex justify-between text-[11px] text-slate-400"><span>안전마진 확보율 (Margin of Safety)</span><span class="text-emerald-400 font-bold">${discount}%</span></div>
                                    <div class="w-full bg-slate-900 rounded-full h-1.5"><div class="bg-emerald-400 h-full rounded-full" style="width: ${discount}%"></div></div>
                                </div>
                            </div>

                            <div class="space-y-1">
                                <h4 class="text-[11px] font-bold text-slate-400 uppercase tracking-wider"><i class="fa-solid fa-lightbulb text-amber-400 mr-1.5"></i> 저평가 사유</h4>
                                <p class="text-[11px] bg-slate-800/40 p-3 rounded-xl border border-slate-800 text-slate-300 leading-relaxed font-normal">${item.description}</p>
                            </div>
                        </div>

                        <!-- ▶ 오른쪽 단: 인근 자산 비교 테이블 및 실사 결론 -->
                        <div class="space-y-4">
                            <div class="overflow-x-auto bg-slate-950 rounded-xl border border-slate-800 p-1 text-[11px]">
                                <table class="w-full text-left border-collapse">
                                    <thead>
                                        <tr class="border-b border-slate-800 text-slate-400 bg-slate-900/50">
                                            <th class="p-2">비교 자산 단지명</th>
                                            <th class="p-2 text-center">평균 매가</th>
                                            <th class="p-2 text-center">격차</th>
                                            <th class="p-2 text-center">입지</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-900 text-slate-300">
                                        <tr class="bg-indigo-500/10 text-indigo-300 font-bold">
                                            <td class="p-2">📌 본 자산</td>
                                            <td class="p-2 text-center text-rose-400">${currentPriceBillion}억</td>
                                            <td class="p-2 text-center text-emerald-400">기준선</td>
                                            <td class="p-2 text-center text-emerald-400">A+</td>
                                        </tr>
                                        <tr>
                                            <td class="p-2 truncate max-w-[100px]">${comp1_name}</td>
                                            <td class="p-2 text-center">${comp1_price}억</td>
                                            <td class="p-2 text-center text-slate-500">+${comp1_price - currentPriceBillion}억</td>
                                            <td class="p-2 text-center">A</td>
                                        </tr>
                                        <tr>
                                            <td class="p-2 truncate max-w-[100px]">${comp2_name}</td>
                                            <td class="p-2 text-center">${comp2_price}억</td>
                                            <td class="p-2 text-center text-slate-500">+${comp2_price - currentPriceBillion}억</td>
                                            <td class="p-2 text-center">B+</td>
                                        </tr>
                                        <tr>
                                            <td class="p-2 truncate max-w-[100px]">${comp3_name}</td>
                                            <td class="p-2 text-center">${comp3_price}억</td>
                                            <td class="p-2 text-center text-slate-500">+${comp3_price - currentPriceBillion}억</td>
                                            <td class="p-2 text-center">A</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            <div class="bg-slate-950/40 border border-slate-800 p-3 rounded-xl text-[11px] leading-relaxed text-slate-400 space-y-2">
                                <div>
                                    <strong class="text-slate-200 block mb-0.5"><i class="fa-solid fa-magnifying-glass text-indigo-400 mr-1"></i> 주변 인프라 연동 분석 결론</strong>
                                    인근 대조 단지들의 평균 시세가 두터운 지지선을 구축하고 있는 반면, 본 자산은 매도인의 일시적 유동성 사유로 인해 압도적인 안전마진(<span class="text-emerald-400 font-bold">약 +${marginBillion}억 원</span> 확보)을 탑재했습니다. 교통 요지 입지로 실거주 배후 수요가 풍부하여 리스크 방어력이 뛰어난 투자 적격 대상으로 최종 판정합니다.
                                </div>
                            </div>
                        </div>

                    </div>

                    <!-- 작업 버튼 바 (인쇄 시 자동 숨김) -->
                    <div class="pt-2 flex gap-2 action-buttons">
                        <button onclick="window.print()" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded-xl text-xs shadow-lg shadow-indigo-600/10 transition flex justify-center items-center gap-1.5">
                            <i class="fa-solid fa-file-pdf"></i> 📊 AI 투자 가치 분석서 받기
                        </button>
                        <button onclick="alert('전담 파트너 공인중개사 연결이 요청되었습니다. 5분 내로 문자로 연락드립니다.')" class="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-200 font-semibold py-3 px-4 rounded-xl text-xs transition border border-slate-700 flex justify-center items-center gap-1.5">
                            <i class="fa-solid fa-comment-dots"></i> ✉️ 전문 중개사에게 문의하기
                        </button>
                    </div>
                </div>
            `;
            modal.classList.add('modal-active');
        }

        function closeModal(e) {
            document.getElementById('detailModal').classList.remove('modal-active');
        }

        window.onload = () => { fetchDeals(); };
    </script>
</body>
</html>
